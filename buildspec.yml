version: 0.2

env:
  variables:
    REGION: ap-south-1
    AWS_ACCOUNT_ID: 618060700241
    ECR_REPO: sample-webapp
    PORT: 8080
    ECS_CLUSTER: sample-webapp-cluster-latest
    ECS_SERVICE: sample-webapp-service
  exported-variables:
    - IMAGE_TAG

phases: 
  install:
    runtime-versions:
      java: corretto21
  
  pre_build:
    commands:
      - export IMAGE_TAG=$CODEBUILD_BUILD_NUMBER
      - echo "Running Tests for Build "
      - mvn test
      - echo "Logging into ECR"
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com
      - echo "Login Successful"
  
  build:
    commands:
      - echo "Build starting"
      - mvn clean package -DskipTests
      - echo "Listing target folder"
      - ls target/
      - echo "Building docker image"
      - docker build -t $ECR_REPO:$IMAGE_TAG .
      - docker tag $ECR_REPO:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG

  post_build:
    commands:
      - echo "Pushing image"
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG
      - echo "Succesfully pushed $ECR_REPO:$IMAGE_TAG to ECR"
      - echo "Registering new ECS Task Definition..."
      - |
        TASK_DEF_ARN=$(aws ecs register-task-definition \
        --family $ECS_TASKDEFINITION \
        --network-mode awsvpc \
        --requires-compatibilities FARGATE \
        --cpu "512" \
        --memory "1024" \
        --execution-role-arn arn:aws:iam::$AWS_ACCOUNT_ID:role/ecsTaskExecutionRole \
        --container-definitions "[{\"name\":\"sample-webapp\",\"image\":\"$AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG\",\"portMappings\":[{\"containerPort\":8080,\"protocol\":\"tcp\"}]}]" \
        --query 'taskDefinition.taskDefinitionArn' \
        --output text \
        --region $REGION)

      - echo "Updating ECS Service with latest Task Definition..."
      - aws ecs update-service \
        --cluster $ECS_CLUSTER \
        --service $ECS_SERVICE \
        --task-definition $TASK_DEF_ARN \
        --force-new-deployment \
        --region $REGION

      - echo "Deployment completed successfully 🚀"
      
artifacts:
  files:
    - 'sample-webapp-1.0.jar'
  base-directory: target

cache:
  paths:
    - /root/.m2/**/*
